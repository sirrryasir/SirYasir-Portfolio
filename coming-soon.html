  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body, html {
  height: 100%;
  font-family: 'Satoshi', sans-serif;
  overflow: hidden;
  color: white;

#bg-video {

}

.overlay {
  position: relative;

  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 1rem;
}

h1 {
  font-family: 'Nayuki', serif;
  font-size: 3rem;
  color: #1e90ff;
}

.tagline {
  font-size: 1.2rem;
  margin: 1rem 0;
  font-weight: 500;
}

.sub {
  font-size: 1rem;
  margin-bottom: 2rem;
  opacity: 0.8;
}

.social a {
  margin: 0 0.5rem;
  text-decoration: none;
  color: #1e90ff;
  font-weight: 500;
  transition: 0.3s;
}

.social a:hover {
  color: #ffffff;
}
  </style>
